broker_id: usatrace
version: 1
last_verified: '2026-03-08'
phases:
  - name: submit
    steps:
      - action: goto
        url: https://www.usatrace.com/optout
      - action: wait
        ms: 2000
      - action: fill
        selector: input[type="search"]
        value: '{{first_name}} {{last_name}}'
      - action: click
        selector: button:contains("SEARCH"), button:has-text("SEARCH")
      - action: wait
        ms: 2000
      - action: screenshot
        label: success
