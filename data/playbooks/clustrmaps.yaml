broker_id: clustrmaps
version: 1
last_verified: '2026-03-08'
phases:
  - name: submit
    steps:
      - action: goto
        url: https://clustrmaps.com/bl/opt-out
      - action: wait
        ms: 2000
      - action: fill
        selector: input[name="search"], input[placeholder="your@mail.com"]
        value: '{{first_name}} {{last_name}}'
      - action: click
        selector: button:has-text("Next Step")
      - action: wait
        ms: 2000
      - action: fill
        selector: input[placeholder="your@mail.com"]
        value: '{{email}}'
      - action: click
        selector: button:has-text("Submit")
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
