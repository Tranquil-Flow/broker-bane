broker_id: path2response_llc_2
version: 1
last_verified: '2026-03-08'
phases:
  - name: submit
    steps:
      - action: goto
        url: >-
          https://privacyportal-cdn.onetrust.com/dsarwebform/2de26f06-de6f-45a7-8e1d-7d1148a3f301/draft/7a5dc7d1-cc7e-43a8-9f24-702807deb65b.html
      - action: wait
        ms: 2000
      - action: click
        selector: div[role="listbox"]
      - action: click
        selector: div[role="option"]:has-text("Do Not Sell or Share My Personal Information / Opt-Out")
      - action: fill
        selector: input[name="email"], input[type="email"]
        value: '{{email}}'
      - action: click
        selector: div[role="combobox"]:has-text("Are you submitting this request for yourself?")
      - action: click
        selector: div[role="option"]:has-text("Yes")
      - action: fill
        selector: input[name="dataSubjectFirstName"]
        value: '{{first_name}}'
      - action: fill
        selector: input[name="dataSubjectLastName"]
        value: '{{last_name}}'
      - action: fill
        selector: input[name="dataSubjectPhoneNumber"]
        value: '{{phone}}'
      - action: fill
        selector: input[name="dataSubjectAddress"]
        value: '{{address}}'
      - action: fill
        selector: input[name="dataSubjectCity"]
        value: '{{city}}'
      - action: click
        selector: div[role="combobox"]:has-text("Data Subject State")
      - action: click
        selector: div[role="option"]:has-text("{{state}}")
      - action: fill
        selector: input[name="dataSubjectZip"]
        value: '{{zip}}'
      - action: click
        selector: div[role="combobox"]:has-text("Data Subject Country")
      - action: click
        selector: div[role="option"]:has-text("{{country}}")
      - action: click
        selector: div[role="listbox"]:has-text("By clicking")
      - action: click
        selector: div[role="option"]:has-text("Yes")
      - action: click
        selector: button[type="submit"], button:has-text("Submit")
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
