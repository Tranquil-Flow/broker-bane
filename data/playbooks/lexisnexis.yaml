broker_id: lexisnexis
version: 1
last_verified: "2026-03-04"

# LexisNexis opt-out: detailed personal info form with address verification.
# This is a hard broker with a multi-field form.
phases:
  - name: submit
    steps:
      - action: goto
        url: "https://optout.lexisnexis.com/"
      - action: wait
        ms: 3000
      - action: fill
        selector: 'input[name="firstName"], input[placeholder*="First"], input#firstName, input[name="first_name"]'
        value: "{{first_name}}"
      - action: fill
        selector: 'input[name="lastName"], input[placeholder*="Last"], input#lastName, input[name="last_name"]'
        value: "{{last_name}}"
      - action: fill
        selector: 'input[type="email"], input[name="email"], input#email'
        value: "{{email}}"
      - action: fill
        selector: 'input[name="address"], input[placeholder*="Address"], input#address, input[name="street"], input[name="address1"]'
        value: "{{address}}"
      - action: fill
        selector: 'input[name="city"], input[placeholder*="City"], input#city'
        value: "{{city}}"
      - action: select
        selector: 'select[name="state"], select#state'
        value: "{{state}}"
      - action: fill
        selector: 'input[name="zip"], input[placeholder*="Zip"], input#zip, input[name="zipCode"], input[name="postalCode"]'
        value: "{{zip}}"
      - action: fill
        selector: 'input[type="tel"], input[name="phone"], input#phone'
        value: "{{phone}}"
      - action: click
        selector: 'button[type="submit"], button:has-text("Submit"), button:has-text("Opt Out"), input[type="submit"]'
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
