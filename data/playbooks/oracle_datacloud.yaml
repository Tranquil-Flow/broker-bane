broker_id: oracle_datacloud
version: 1
last_verified: "2026-03-04"

# Oracle Data Cloud (BlueKai) opt-out: cookie-based opt-out form.
# The original URL redirects to oracle.com/contracts/data-services/.
# The opt-out is primarily cookie/tracking based with a simple form.
phases:
  - name: submit
    steps:
      - action: goto
        url: "https://datacloudoptout.oracle.com/"
      - action: wait
        ms: 3000
      - action: fill
        selector: 'input[name="firstName"], input[placeholder*="First"], input#firstName, input[name="first_name"]'
        value: "{{first_name}}"
      - action: fill
        selector: 'input[name="lastName"], input[placeholder*="Last"], input#lastName, input[name="last_name"]'
        value: "{{last_name}}"
      - action: fill
        selector: 'input[type="email"], input[name="email"], input#email'
        value: "{{email}}"
      - action: fill
        selector: 'input[name="address"], input[placeholder*="Address"], input#address, input[name="street"]'
        value: "{{address}}"
      - action: fill
        selector: 'input[name="city"], input[placeholder*="City"], input#city'
        value: "{{city}}"
      - action: select
        selector: 'select[name="state"], select#state'
        value: "{{state}}"
      - action: fill
        selector: 'input[name="zip"], input[placeholder*="Zip"], input#zip, input[name="zipCode"]'
        value: "{{zip}}"
      - action: click
        selector: 'button[type="submit"], button:has-text("Submit"), button:has-text("Opt Out"), input[type="submit"]'
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
