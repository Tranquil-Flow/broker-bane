broker_id: spokeo
version: 1
last_verified: "2026-03-04"

# Spokeo opt-out requires a profile URL and email.
# The form asks for the listing URL (or name), then sends a confirmation email.
phases:
  - name: submit
    steps:
      - action: goto
        url: "https://www.spokeo.com/optout"
      - action: wait
        ms: 2000
      - action: fill
        selector: 'input[type="text"].css-3bpass, input[type="text"][required], input[placeholder*="URL"], input[placeholder*="url"]'
        value: "https://www.spokeo.com/{{first_name}}-{{last_name}}"
      - action: fill
        selector: 'input[type="email"], input[name="email"]'
        value: "{{email}}"
      - action: click
        selector: 'button[type="submit"], input[type="submit"], button:has-text("OPT OUT"), button:has-text("Opt Out")'
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
