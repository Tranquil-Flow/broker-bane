broker_id: beenverified
version: 1
last_verified: "2026-03-04"

# BeenVerified opt-out: search by name, select record, enter email.
# NOTE: This broker uses CAPTCHA — automation will likely fail at CAPTCHA step.
# Falls back to manual removal when CAPTCHA is detected.
phases:
  - name: search
    steps:
      - action: goto
        url: "https://www.beenverified.com/app/optout/search"
      - action: wait
        ms: 2000
      - action: fill
        selector: 'input[name="firstName"], input[placeholder*="First Name"], input#firstName'
        value: "{{first_name}}"
      - action: fill
        selector: 'input[name="lastName"], input[placeholder*="Last Name"], input#lastName'
        value: "{{last_name}}"
      - action: fill
        selector: 'input[name="city"], input[placeholder*="City"], input#city'
        value: "{{city}}"
      - action: select
        selector: 'select[name="state"], select#state'
        value: "{{state}}"
      - action: click
        selector: 'button[type="submit"], button:has-text("Search"), input[type="submit"]'
      - action: wait
        ms: 5000

  - name: submit
    steps:
      - action: click
        selector: 'a:has-text("Remove"), button:has-text("Remove"), a.opt-out-link, [data-action="optout"]'
      - action: wait
        ms: 2000
      - action: fill
        selector: 'input[type="email"], input[name="email"], input#email'
        value: "{{email}}"
      - action: check
        selector: 'input[type="checkbox"], input[name="confirm"], input[name="agree"]'
      - action: click
        selector: 'button[type="submit"], button:has-text("Send Verification"), button:has-text("Submit"), button:has-text("Confirm")'
      - action: wait
        ms: 3000
      - action: screenshot
        label: success
